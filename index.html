<!DOCTYPE html>
<html>
<head>
  <title>AYOUTFIT STORE</title>
  <style>
    body {font-family: Arial; padding:20px; background:#f5f5f5;}
    input {width:100%; padding:10px; margin-bottom:20px;}
    .grid {display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .card {background:#fff; padding:10px; border-radius:10px; text-align:center;}
    img {width:100%; border-radius:10px;}
  </style>
</head>

<body>

<h2>🔥 AYOUTFIT STORE 🔥</h2>
<p>Ketik kode produk 👇</p>

<input type="text" id="search" placeholder="Cari kode..." onkeyup="searchProduct()">

<div class="grid" id="productList">

  <div class="card" data-code="777">
    <a href="#">
      <img src="https://i.postimg.cc/gJ821dJW/Screenshot-20260420-192813-2.jpg" style="height:150px; object-fit:cover;">
      <p>777 - Sepatu Sneakers</p>
    </a>
  </div>

  <div class="card" data-code="778">
    <a href="https://s.shopee.co.id/7AZqcaGwq9" target="_blank">
      <img src="https://i.postimg.cc/J7S9GJPb/Screenshot-20260420-191205-2.jpg" style="height:150px; object-fit:cover;">
      <p>778 - sepatu Groza</p>
    </a>
  </div>

  <div class="card" data-code="779">
    <a href="#">
      <img src="https://via.placeholder.com/150">
      <p>779 - Jersey</p>
    </a>
  </div>

</div>

<script>
function searchProduct() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let code = card.getAttribute("data-code");
    if(code.includes(input)){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
